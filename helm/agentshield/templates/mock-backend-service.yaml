apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentshield.fullname" . }}-mock-backend
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
    app.kubernetes.io/component: mock-backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.mockBackend.port }}
      targetPort: {{ .Values.mockBackend.port }}
      protocol: TCP
  selector:
    {{- include "agentshield.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mock-backend
