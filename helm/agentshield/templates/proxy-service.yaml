apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentshield.fullname" . }}-proxy
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    {{- include "agentshield.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
