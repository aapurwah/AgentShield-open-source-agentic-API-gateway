apiVersion: v1
kind: Service
metadata:
  name: {{ include "agentshield.fullname" . }}-dashboard
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    {{- include "agentshield.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
