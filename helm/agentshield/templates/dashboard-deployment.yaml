apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agentshield.fullname" . }}-dashboard
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "agentshield.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "agentshield.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ include "agentshield.fullname" . }}-redis:6379"
            {{- else }}
            - name: REDIS_URL
              value: "redis://{{ .Values.redis.externalHost }}:6379"
            {{- end }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "agentshield.fullname" . }}-redis-password
                  key: REDIS_PASSWORD
          livenessProbe:
            httpGet:
              path: /api/metrics
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/metrics
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
