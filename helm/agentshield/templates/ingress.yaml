{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "agentshield.fullname" . }}-ingress
  labels:
    {{- include "agentshield.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "agentshield.fullname" $ }}-{{ .service }}
                port:
                  number: {{ if eq .service "proxy" }}8080{{ else }}3000{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
