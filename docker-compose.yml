services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  mock-backend:
    build: ./mock-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001

  proxy:
    build: ./proxy
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
      - BACKEND_URL=http://mock-backend:3001
      - REDIS_ADDR=redis:6379
    depends_on:
      redis:
        condition: service_healthy
      mock-backend:
        condition: service_started

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
